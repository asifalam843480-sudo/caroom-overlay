<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Carrom Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; border-top: 4px solid #00e676; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; font-size: 18px; background: #000; border: 1px solid #333; color: #fff; margin-bottom: 15px; font-weight: bold; border-radius: 6px; text-align: center; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        
        .btn-score { background: #00e676; color: black; }
        .btn-foul { background: #ff1744; color: white; }
        .btn-queen { background: #ffd600; color: black; width: 100%; padding: 15px; font-size: 18px; margin-bottom: 15px; }
        .btn-sys { background: #333; color: white; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="grid">
        <div class="card">
            <input type="text" id="p1-name" value="PLAYER 1" oninput="saveData()">
            
            <h3>Score Control</h3>
            <div class="btn-group">
                <button class="btn-score" onclick="addScore(1)">+1 COIN (Auto Adjust)</button>
                <button class="btn-sys" onclick="manualScore(1, -1)">-1</button>
            </div>
            
            <h3>Foul / Due</h3>
            <div class="btn-group">
                <button class="btn-foul" onclick="addDue(1)">🚨 FOUL (Add Due)</button>
                <button class="btn-sys" onclick="manualDue(1, -1)">-1 Due</button>
            </div>
            
            <button class="btn-queen" onclick="setQueen(1)">👑 P1 SECURED QUEEN</button>
        </div>

        <div class="card">
            <input type="text" id="p2-name" value="PLAYER 2" oninput="saveData()">
            
            <h3>Score Control</h3>
            <div class="btn-group">
                <button class="btn-score" onclick="addScore(2)">+1 COIN (Auto Adjust)</button>
                <button class="btn-sys" onclick="manualScore(2, -1)">-1</button>
            </div>
            
            <h3>Foul / Due</h3>
            <div class="btn-group">
                <button class="btn-foul" onclick="addDue(2)">🚨 FOUL (Add Due)</button>
                <button class="btn-sys" onclick="manualDue(2, -1)">-1 Due</button>
            </div>
            
            <button class="btn-queen" onclick="setQueen(2)">👑 P2 SECURED QUEEN</button>
        </div>
    </div>

    <div class="card" style="margin-top: 20px; text-align: center; border-top: 4px solid #555;">
        <div class="btn-group">
            <button class="btn-sys" onclick="changeBoard(-1)">PREV BOARD</button>
            <button class="btn-sys" onclick="changeBoard(1)">NEXT BOARD</button>
            <button class="btn-queen" style="margin-bottom:0;" onclick="setQueen(0)">RESET QUEEN TO CENTER</button>
            <button class="btn-foul" style="margin-bottom:0;" onclick="resetMatch()">RESET FULL MATCH</button>
        </div>
    </div>

    <script>
        // State Machine
        let s = { p1Name:"PLAYER 1", p2Name:"PLAYER 2", p1Score:0, p2Score:0, p1Due:0, p2Due:0, queen:0, board:1 };

        function saveData() {
            s.p1Name = document.getElementById('p1-name').value;
            s.p2Name = document.getElementById('p2-name').value;
            localStorage.setItem('carromAutoState', JSON.stringify(s));
            // Trigger storage event for same-page sync
            localStorage.setItem('ping', Date.now()); 
        }

        // SMART AUTOMATIC LOGIC: If player has Due, deduct due first. If no due, increase score.
        function addScore(p) {
            if (p === 1) {
                if (s.p1Due > 0) s.p1Due--;
                else s.p1Score++;
            } else {
                if (s.p2Due > 0) s.p2Due--;
                else s.p2Score++;
            }
            saveData();
        }

        // Add Penalty Due
        function addDue(p) {
            if(p === 1) s.p1Due++;
            else s.p2Due++;
            saveData();
        }

        // Manual Overrides (in case of mistakes)
        function manualScore(p, val) {
            if(p === 1) s.p1Score = Math.max(0, s.p1Score + val);
            else s.p2Score = Math.max(0, s.p2Score + val);
            saveData();
        }
        
        function manualDue(p, val) {
            if(p === 1) s.p1Due = Math.max(0, s.p1Due + val);
            else s.p2Due = Math.max(0, s.p2Due + val);
            saveData();
        }

        function setQueen(val) { s.queen = val; saveData(); }
        function changeBoard(val) { s.board = Math.max(1, s.board + val); saveData(); }

        function resetMatch() {
            if(confirm("Bhai naya match start karein? Pura data zero ho jayega!")) {
                s.p1Score = 0; s.p2Score = 0; s.p1Due = 0; s.p2Due = 0; s.queen = 0; s.board = 1;
                saveData();
            }
        }

        saveData(); // Initial load
    </script>
</body>
</html>

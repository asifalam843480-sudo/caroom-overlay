<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indian Pro - Command Center (V3 Final)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; padding: 20px; margin: 0; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; margin: auto;}
        .box { background: #1a1a1a; padding: 20px; border-radius: 12px; border-top: 4px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .box-p1 { border-top-color: #00e676; }
        .box-p2 { border-top-color: #00e676; }
        .box-full { grid-column: span 2; border-top-color: #ffc107; background: #1c1a12;}
        .box-danger { grid-column: span 2; border-top-color: #ff1744; background: #1a0505;}
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; font-size: 16px; border-radius: 6px; box-sizing: border-box; text-align: center; font-weight: bold;
        }
        button { 
            padding: 12px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.1s; width: 100%; margin-bottom: 10px; text-transform: uppercase;
        }
        button:active { transform: scale(0.97); }
        
        .flex-row { display: flex; gap: 10px; }
        .btn-green { background: #00e676; color: black; }
        .btn-red { background: #ff1744; color: white; }
        .btn-dark { background: #333; color: white; }
        .btn-neon { background: transparent; border: 2px solid #00e676; color: #00e676; }
        .btn-fire { background: linear-gradient(90deg, #ff5722, #ffc107); color: black; font-size: 18px;}
        .btn-undo { background: #ff9800; color: black; font-size: 16px; box-shadow: 0 0 10px rgba(255, 152, 0, 0.4);}
        
        h2 { margin: 0 0 15px 0; font-size: 16px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .lbl { font-size: 12px; color: #888; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <div class="box box-p1">
            <h2>Player 1 Controls</h2>
            <input type="text" id="p1-name" value="PLAYER 1" oninput="save()">
            <button class="btn-dark" onclick="toss(1)">P1 WON TOSS (White)</button>
            <button class="btn-neon" onclick="setTurn(1)">🟩 TURN P1</button>
            <button class="btn-red" onclick="triggerFoul(1)">🚨 FAULT P1</button>
            <button class="btn-red" style="border: 2px solid #fff;" onclick="setQueen(1)">🔴 P1 RED COVERED</button>
            
            <div class="flex-row" style="margin-top: 15px;">
                <button class="btn-dark" onclick="modScore(1, -1)">-1 Score</button>
                <button class="btn-dark" onclick="modScore(1, 1)">+1 Score</button>
            </div>
        </div>

        <div class="box box-p2">
            <h2>Player 2 Controls</h2>
            <input type="text" id="p2-name" value="PLAYER 2" oninput="save()">
            <button class="btn-dark" onclick="toss(2)">P2 WON TOSS (White)</button>
            <button class="btn-neon" onclick="setTurn(2)">🟩 TURN P2</button>
            <button class="btn-red" onclick="triggerFoul(2)">🚨 FAULT P2</button>
            <button class="btn-red" style="border: 2px solid #fff;" onclick="setQueen(2)">🔴 P2 RED COVERED</button>

            <div class="flex-row" style="margin-top: 15px;">
                <button class="btn-dark" onclick="modScore(2, -1)">-1 Score</button>
                <button class="btn-dark" onclick="modScore(2, 1)">+1 Score</button>
            </div>
        </div>

        <div class="box box-full">
            <h2>🎯 Board Target Calculator</h2>
            <div class="lbl">Rule: Select Winner -> Enter Loser's Coins Left. Auto calculates everything.</div>
            
            <div class="flex-row">
                <select id="board-winner">
                    <option value="1">🏆 PLAYER 1 WON THIS BOARD</option>
                    <option value="2">🏆 PLAYER 2 WON THIS BOARD</option>
                </select>
                <input type="number" id="coins-left" placeholder="Opponent Coins Left (0-9)" min="0" max="9">
            </div>
            
            <button class="btn-green" style="font-size: 20px; padding: 15px;" onclick="calcBoard()">✅ SUBMIT & UPDATE HISTORY</button>
            <div class="flex-row">
                <button class="btn-dark" onclick="setQueen(0)">UNDO RED (Back to Center)</button>
                <button class="btn-undo" onclick="undoLastBoard()">⏪ UNDO LAST BOARD (Rewind)</button>
            </div>
        </div>

        <div class="box box-danger">
            <h2>🎬 Director FX & Reset</h2>
            <button class="btn-fire" onclick="triggerHeat()">🔥 TRIGGER PREMIUM HEAT FINISH</button>
            <button class="btn-dark" style="background: #222; border: 1px solid #ff1744; color: #ff1744;" onclick="resetMatch()">⚠ WIPE FULL MATCH & HISTORY</button>
        </div>

    </div>

    <script>
        let s = { 
            p1Name:"PLAYER 1", p2Name:"PLAYER 2", p1Score:0, p2Score:0, 
            p1Color:"white", p2Color:"black", turn: 1, queen:0, matchWinner: 0,
            foulId: null, foulPlayer: 0, nilId: null, heatId: null,
            history: [] // Master Array for Board History
        };

        function save() {
            s.p1Name = document.getElementById('p1-name').value;
            s.p2Name = document.getElementById('p2-name').value;
            localStorage.setItem('carromFinalSync', JSON.stringify(s));
            localStorage.setItem('pingFinal', Date.now()); 
        }

        function toss(winner) {
            if(winner === 1) { s.p1Color = "white"; s.p2Color = "black"; }
            else { s.p1Color = "black"; s.p2Color = "white"; }
            save();
        }

        function setTurn(player) { s.turn = player; save(); }
        function triggerFoul(player) { s.foulPlayer = player; s.foulId = Date.now(); save(); }
        function setQueen(player) { s.queen = player; save(); }
        function triggerHeat() { s.heatId = Date.now(); save(); }

        // Stealth Manual Override
        function modScore(player, val) {
            if(player === 1) s.p1Score = Math.max(0, s.p1Score + val);
            if(player === 2) s.p2Score = Math.max(0, s.p2Score + val);
            save();
        }

        function calcBoard() {
            if(s.matchWinner !== 0) { alert("Match Khatam! Reset button dabao."); return; }

            let winner = parseInt(document.getElementById('board-winner').value);
            let coinsLeft = parseInt(document.getElementById('coins-left').value);
            
            if(isNaN(coinsLeft)) { alert("Goti ka number dalo bhai!"); return; }

            let b_p1 = 0; let b_p2 = 0;
            let boardPoints = coinsLeft; 
            if(s.queen === winner) boardPoints += 5; // Adds 5 if winner secured Red

            if(winner === 1) { b_p1 = boardPoints; s.p1Score += b_p1; }
            if(winner === 2) { b_p2 = boardPoints; s.p2Score += b_p2; }

            // Save to History Array
            s.history.push({ p1: b_p1, p2: b_p2 });

            // TRUE NIL & WINNER LOGIC
            if(s.p1Score >= 29) {
                s.matchWinner = 1;
                if(s.p2Score === 0) s.nilId = Date.now(); // P1 wins 29 to 0
            } else if(s.p2Score >= 29) {
                s.matchWinner = 2;
                if(s.p1Score === 0) s.nilId = Date.now(); // P2 wins 29 to 0
            }

            // Prep next board
            if(s.matchWinner === 0) {
                s.queen = 0; 
                let temp = s.p1Color; s.p1Color = s.p2Color; s.p2Color = temp; // Swap White/Black
            }

            save();
            document.getElementById('coins-left').value = '';
        }

        // 🔥 THE TIME MACHINE FUNCTION 🔥
        function undoLastBoard() {
            if(s.history.length === 0) {
                alert("Undo karne ke liye koi history nahi hai!");
                return;
            }

            // 1. Delete last entry from array
            let lastBoard = s.history.pop();

            // 2. Subtract those points
            s.p1Score -= lastBoard.p1;
            s.p2Score -= lastBoard.p2;

            if(s.p1Score < 0) s.p1Score = 0;
            if(s.p2Score < 0) s.p2Score = 0;

            // 3. Clear match winner if it was falsely triggered
            s.matchWinner = 0;

            // 4. Swap coins back to previous state
            let temp = s.p1Color; s.p1Color = s.p2Color; s.p2Color = temp;

            // 5. Reset Queen text
            s.queen = 0;

            save();
        }

        function resetMatch() {
            if(confirm("Match aur History poori clean karni hai?")) {
                s.p1Score=0; s.p2Score=0; s.queen=0; s.matchWinner=0; s.history=[];
                save();
            }
        }

        save(); // Init
    </script>
</body>
</html>

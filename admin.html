<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indian Rule Calculator</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #121212; color: white; padding: 15px; margin: 0; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #00e676; }
        .box-red { border-left: 5px solid #ff1744; }
        input[type="text"], input[type="number"], select { 
            width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; font-size: 16px; border-radius: 5px; box-sizing: border-box;
        }
        button { 
            padding: 12px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 10px;
        }
        button:active { transform: scale(0.98); }
        .btn-green { background: #00e676; color: black; }
        .btn-red { background: #ff1744; color: white; }
        .btn-dark { background: #333; color: white; }
        
        .flex-row { display: flex; gap: 10px; }
        h2 { margin-top: 0; font-size: 20px; text-transform: uppercase; color: #aaa; }
    </style>
</head>
<body>

    <div class="box">
        <h2>1. Match Setup (Toss)</h2>
        <div class="flex-row">
            <input type="text" id="p1-name" value="PLAYER 1" oninput="save()">
            <input type="text" id="p2-name" value="PLAYER 2" oninput="save()">
        </div>
        <button class="btn-dark" onclick="toss(1)">P1 Won Toss (Gets White)</button>
        <button class="btn-dark" onclick="toss(2)">P2 Won Toss (Gets White)</button>
    </div>

    <div class="box box-red">
        <h2>2. Live Board Action</h2>
        <p style="color:#aaa; font-size: 14px;">Jaise hi koi RED cover kare, ye button dabao:</p>
        <div class="flex-row">
            <button class="btn-red" onclick="setQueen(1)">🔴 P1 Secured RED</button>
            <button class="btn-red" onclick="setQueen(2)">🔴 P2 Secured RED</button>
        </div>
        <button class="btn-dark" onclick="setQueen(0)">Undo / Red wapas board pe aayi</button>
    </div>

    <div class="box">
        <h2>3. Board Finish Calculator</h2>
        <p style="color:#aaa; font-size: 14px;">Board khatam hote hi detail dalo, math apne aap hoga (Jaise R+5=10).</p>
        
        <label>Ye Board Kaun Jeeta?</label>
        <select id="board-winner">
            <option value="1">PLAYER 1 Jeeta</option>
            <option value="2">PLAYER 2 Jeeta</option>
        </select>

        <label>Haarne wale ki kitni Goti (coins) board par bachi hai?</label>
        <input type="number" id="coins-left" placeholder="Example: 5" min="0" max="9">

        <button class="btn-green" onclick="calcBoard()" style="margin-top: 15px; font-size: 20px;">✅ CALCULATE & NEXT BOARD</button>
    </div>

    <div class="box" style="border-left: 5px solid #555;">
        <h2>Manual Score Edit</h2>
        <div class="flex-row">
            <button class="btn-dark" onclick="modScore('p1Score', -1)">P1 Score -1</button>
            <button class="btn-dark" onclick="modScore('p2Score', -1)">P2 Score -1</button>
        </div>
        <button class="btn-dark" onclick="resetMatch()">⚠ RESET FULL MATCH</button>
    </div>

    <script>
        let s = { p1Name:"PLAYER 1", p2Name:"PLAYER 2", p1Score:0, p2Score:0, p1Color:"white", p2Color:"black", board:1, queen:0 };

        function save() {
            s.p1Name = document.getElementById('p1-name').value;
            s.p2Name = document.getElementById('p2-name').value;
            localStorage.setItem('carromIndiaState', JSON.stringify(s));
            localStorage.setItem('ping', Date.now()); 
        }

        // Toss Set
        function toss(winner) {
            if(winner === 1) { s.p1Color = "white"; s.p2Color = "black"; }
            else { s.p1Color = "black"; s.p2Color = "white"; }
            alert("Toss Update: " + (winner===1?s.p1Name:s.p2Name) + " ko White mil gaya!");
            save();
        }

        function setQueen(player) { s.queen = player; save(); }

        // The Magic Calculator
        function calcBoard() {
            let winner = parseInt(document.getElementById('board-winner').value);
            let coinsLeft = parseInt(document.getElementById('coins-left').value);
            
            if(isNaN(coinsLeft)) { alert("Bhai, bachi hui goti ka number dalo!"); return; }

            // Step 1: Jisne Red (Queen) li usko 5 point de do.
            if(s.queen === 1) s.p1Score += 5;
            if(s.queen === 2) s.p2Score += 5;

            // Step 2: Jo Jeeta usko bachi hui goti (coins) ka point de do.
            if(winner === 1) s.p1Score += coinsLeft;
            if(winner === 2) s.p2Score += coinsLeft;

            // Step 3: Agla board set karo aur color palat do.
            s.board += 1;
            s.queen = 0; 
            let temp = s.p1Color; s.p1Color = s.p2Color; s.p2Color = temp; 

            save();
            document.getElementById('coins-left').value = '';
            alert("✅ Score lag gaya! Aur agle board ke liye White/Black palat diye gaye hain.");
        }

        function modScore(player, val) { s[player] = Math.max(0, s[player] + val); save(); }

        function resetMatch() {
            if(confirm("Pura match zero se shuru karein?")) {
                s.p1Score=0; s.p2Score=0; s.board=1; s.queen=0; s.p1Color="white"; s.p2Color="black";
                save();
            }
        }
        
        save();
    </script>
</body>
</html>

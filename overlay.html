<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indian Pro Carrom - Ultimate Broadcast</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700;900&display=swap');
        
        body { margin: 0; padding: 0; font-family: 'Chakra Petch', sans-serif; color: white; overflow: hidden; background: transparent;}
        
        .master-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10;
        }

        .hud-wrapper {
            display: flex; align-items: stretch; justify-content: center;
            background: rgba(10, 10, 15, 0.95); border: 2px solid #333; border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); padding: 5px; transition: 0.5s ease; position: relative;
        }

        /* The Player Box */
        .player-panel {
            display: flex; align-items: center; padding: 15px 25px; width: 400px; position: relative; transition: 0.3s ease;
        }
        
        /* 🟩 TURN INDICATOR (Neon Base Glow) */
        .active-turn { 
            background: radial-gradient(ellipse at bottom, rgba(0,230,118,0.2) 0%, rgba(0,0,0,0) 70%);
            box-shadow: inset 0 -3px 0 #00e676;
        }

        .p1-side { justify-content: flex-start; }
        .p2-side { justify-content: flex-end; flex-direction: row-reverse; text-align: right; }

        .coin-indicator {
            width: 30px; height: 30px; border-radius: 50%; margin: 0 20px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.6), 0 0 10px rgba(255,255,255,0.2);
        }
        .white-coin { background: #fdfdfd; border: 3px solid #777; }
        .black-coin { background: #111; border: 3px solid #333; }

        .name-box { flex-grow: 1; }
        .name { font-size: 38px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; line-height: 1;}
        
        .queen-tag { 
            font-size: 16px; font-weight: 700; color: #ff1744; 
            background: rgba(255, 23, 68, 0.1); padding: 2px 8px; border-radius: 4px;
            border: 1px solid #ff1744; display: inline-block; opacity: 0; transform: translateY(5px); transition: 0.3s;
        }
        .queen-tag.active { opacity: 1; transform: translateY(0); }

        .score { font-size: 85px; font-weight: 900; color: #00e676; width: 110px; text-align: center; text-shadow: 0 0 30px rgba(0, 230, 118, 0.5); line-height: 0.9;}

        .center-board {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #d50000, #800000); padding: 0 35px; border-radius: 8px;
            border-left: 2px solid #ff5252; border-right: 2px solid #ff5252; box-shadow: 0 0 25px rgba(213, 0, 0, 0.5); z-index: 2;
        }
        .board-text { font-size: 22px; letter-spacing: 4px; font-weight: 700; color: #ffcdd2; margin-bottom: -5px;}
        .board-num { font-size: 55px; font-weight: 900; line-height: 1; }

        /* 📊 BOARD HISTORY TRACKER (E-Sports Style) */
        .history-panel {
            width: 90%; background: rgba(0, 0, 0, 0.85); border: 1px solid #444; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; padding: 6px 20px; box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        .hist-track { display: flex; gap: 6px; }
        .hist-box { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 4px 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 30px;
        }
        .hist-box.scored { background: rgba(0, 230, 118, 0.15); border-color: #00e676; }
        .hist-lbl { font-size: 11px; color: #888; font-weight: 700; letter-spacing: 1px; }
        .hist-pts { font-size: 18px; font-weight: 900; color: #555; line-height: 1.1; }
        .hist-box.scored .hist-pts { color: #00e676; text-shadow: 0 0 10px rgba(0,230,118,0.5); }
        .hist-center-title { font-size: 14px; font-weight: 700; color: #666; letter-spacing: 3px; }

        /* 🚨 FAULT ANIMATION (With Auto-Hide) */
        @keyframes faultFlash { 0%, 100% { background: transparent; } 50% { background: rgba(255,0,0,0.4); box-shadow: inset 0 0 50px red; } }
        .foul-active { animation: faultFlash 0.3s 4; }
        .foul-text { position: absolute; top: -40px; font-size: 28px; font-weight: 900; color: #ff1744; letter-spacing: 2px; opacity: 0; transition: 0.3s ease; text-shadow: 0 0 15px #ff1744;}
        .foul-active .foul-text { opacity: 1; transform: translateY(-10px); }
        .p1-side .foul-text { left: 25px; } .p2-side .foul-text { right: 25px; }

        /* 💀 TRUE NIL ANIMATION */
        .nil-stamp { 
            position: absolute; top: -140px; left: 50%; transform: translateX(-50%) scale(0.5); 
            color: #ff1744; font-size: 65px; font-weight: 900; border: 8px solid #ff1744; 
            padding: 5px 40px; letter-spacing: 5px; opacity: 0; pointer-events: none; 
            text-shadow: 0 0 20px rgba(0,0,0,0.9); background: rgba(10,10,15,0.9); box-shadow: 0 0 40px rgba(255,23,68,0.5);
            border-radius: 10px; z-index: 20;
        }
        .show-nil { animation: stampSlam 4s forwards; }
        @keyframes stampSlam { 
            0% { transform: translateX(-50%) scale(3); opacity: 0; } 
            10% { transform: translateX(-50%) scale(1) rotate(-3deg); opacity: 1; box-shadow: 0 0 80px #ff1744;} 
            90% { transform: translateX(-50%) scale(1) rotate(-3deg); opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) scale(0.8); }
        }

        /* 🔥 PREMIUM HEAT FINISH */
        .premium-heat {
            position: absolute; top: -90px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: linear-gradient(90deg, rgba(0,0,0,0), rgba(255, 87, 34, 0.9), rgba(0,0,0,0));
            padding: 10px 80px; border-top: 1px solid #ffc107; border-bottom: 1px solid #ffc107;
            opacity: 0; pointer-events: none; z-index: 15;
        }
        .heat-txt { font-size: 32px; font-weight: 900; color: #fff; font-style: italic; letter-spacing: 6px; text-shadow: 0 0 20px #ffeb3b; }
        .show-heat { animation: sleekHeatIn 3s forwards; }
        @keyframes sleekHeatIn {
            0% { width: 0%; opacity: 0; filter: brightness(3); }
            15% { width: 100%; opacity: 1; filter: brightness(1); box-shadow: 0 0 50px rgba(255,87,34,0.8); }
            85% { width: 100%; opacity: 1; box-shadow: 0 0 20px rgba(255,87,34,0.5); }
            100% { width: 0%; opacity: 0; }
        }

        /* 👑 VICTORY DOMINANCE */
        .winner-crown { position: absolute; top: -35px; font-size: 30px; opacity: 0; transition: 0.5s; filter: drop-shadow(0 0 10px #ffd700); }
        .p1-side .winner-crown { left: 30px; } .p2-side .winner-crown { right: 30px; }

        body.match-over-1 .p2-side { opacity: 0.2; filter: grayscale(100%); }
        body.match-over-1 .p1-side { transform: scale(1.02); }
        body.match-over-1 .p1-side .winner-crown { opacity: 1; animation: floatCrown 1s infinite alternate; }
        
        body.match-over-2 .p1-side { opacity: 0.2; filter: grayscale(100%); }
        body.match-over-2 .p2-side { transform: scale(1.02); }
        body.match-over-2 .p2-side .winner-crown { opacity: 1; animation: floatCrown 1s infinite alternate; }

        @keyframes floatCrown { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }

    </style>
</head>
<body>

    <div class="master-container">
        
        <!-- FX Layers -->
        <div class="nil-stamp" id="nil-graphic">TRUE NIL (29-0)</div>
        <div class="premium-heat" id="heat-graphic"><div class="heat-txt">HEAT FINISH</div></div>

        <!-- Main HUD -->
        <div class="hud-wrapper">
            <!-- Player 1 -->
            <div class="player-panel p1-side" id="p1-box">
                <div class="foul-text">FAULT!</div>
                <div class="winner-crown">👑</div>
                <div class="coin-indicator white-coin" id="p1-coin"></div>
                <div class="name-box">
                    <div class="name" id="p1-name">PLAYER 1</div>
                    <div class="queen-tag" id="p1-queen">🔴 RED SECURED</div>
                </div>
                <div class="score" id="p1-score">0</div>
            </div>

            <!-- Center Target -->
            <div class="center-board">
                <div class="board-text">TARGET</div>
                <div class="board-num">29</div>
            </div>

            <!-- Player 2 -->
            <div class="player-panel p2-side" id="p2-box">
                <div class="foul-text">FAULT!</div>
                <div class="winner-crown">👑</div>
                <div class="coin-indicator black-coin" id="p2-coin"></div>
                <div class="name-box">
                    <div class="name" id="p2-name">PLAYER 2</div>
                    <div class="queen-tag" id="p2-queen">🔴 RED SECURED</div>
                </div>
                <div class="score" id="p2-score">0</div>
            </div>
        </div>

        <!-- Board History Bar -->
        <div class="history-panel">
            <div class="hist-track" id="p1-history"></div>
            <div class="hist-center-title">BOARD HISTORY</div>
            <div class="hist-track" id="p2-history" style="flex-direction: row-reverse;"></div>
        </div>

    </div>

    <script>
        let lastFoul = 0; let lastNil = 0; let lastHeat = 0;

        // Auto-Destruct Timers Tracker
        let foulTimer = null; let nilTimer = null; let heatTimer = null;

        window.addEventListener('storage', () => {
            let data = JSON.parse(localStorage.getItem('carromFinalSync') || '{}');
            if(!data.p1Name) return;

            // Core Info
            document.getElementById('p1-name').innerText = data.p1Name;
            document.getElementById('p2-name').innerText = data.p2Name;
            document.getElementById('p1-score').innerText = data.p1Score;
            document.getElementById('p2-score').innerText = data.p2Score;
            
            document.getElementById('p1-coin').className = 'coin-indicator ' + data.p1Color + '-coin';
            document.getElementById('p2-coin').className = 'coin-indicator ' + data.p2Color + '-coin';
            
            document.getElementById('p1-queen').classList.toggle('active', data.queen === 1);
            document.getElementById('p2-queen').classList.toggle('active', data.queen === 2);

            document.getElementById('p1-box').classList.toggle('active-turn', data.turn === 1);
            document.getElementById('p2-box').classList.toggle('active-turn', data.turn === 2);

            // Populate Board History Dynamically
            let h1 = '', h2 = '';
            if(data.history && data.history.length > 0) {
                data.history.forEach((h, index) => {
                    let bNum = index + 1;
                    h1 += `<div class="hist-box ${h.p1 > 0 ? 'scored' : ''}"><div class="hist-lbl">B${bNum}</div><div class="hist-pts">${h.p1}</div></div>`;
                    h2 += `<div class="hist-box ${h.p2 > 0 ? 'scored' : ''}"><div class="hist-lbl">B${bNum}</div><div class="hist-pts">${h.p2}</div></div>`;
                });
            } else {
                h1 = `<div class="hist-box"><div class="hist-lbl">B1</div><div class="hist-pts">0</div></div>`;
                h2 = `<div class="hist-box"><div class="hist-lbl">B1</div><div class="hist-pts">0</div></div>`;
            }
            document.getElementById('p1-history').innerHTML = h1;
            document.getElementById('p2-history').innerHTML = h2;

            // 🚨 FAULT EVENT (With Auto-Destruct Bug Fix)
            if(data.foulId !== lastFoul && data.foulId) {
                lastFoul = data.foulId;
                let box = data.foulPlayer === 1 ? document.getElementById('p1-box') : document.getElementById('p2-box');
                
                // Clear any existing timer so it doesn't interrupt a fresh click
                if(foulTimer) clearTimeout(foulTimer);
                
                box.classList.remove('foul-active'); void box.offsetWidth; 
                box.classList.add('foul-active');
                
                // BOOM! Magic Fix: Remove text after 2 seconds
                foulTimer = setTimeout(() => {
                    box.classList.remove('foul-active');
                }, 2000);
            }

            // 💀 NIL EVENT (With Memory Cleaner)
            if(data.nilId !== lastNil && data.nilId) {
                lastNil = data.nilId;
                let el = document.getElementById('nil-graphic');
                
                if(nilTimer) clearTimeout(nilTimer);
                el.classList.remove('show-nil'); void el.offsetWidth;
                el.classList.add('show-nil');
                
                nilTimer = setTimeout(() => el.classList.remove('show-nil'), 4500);
            }

            // 🔥 HEAT FINISH EVENT (With Memory Cleaner)
            if(data.heatId !== lastHeat && data.heatId) {
                lastHeat = data.heatId;
                let el = document.getElementById('heat-graphic');
                
                if(heatTimer) clearTimeout(heatTimer);
                el.classList.remove('show-heat'); void el.offsetWidth;
                el.classList.add('show-heat');
                
                heatTimer = setTimeout(() => el.classList.remove('show-heat'), 3500);
            }

            // VICTORY DOMINANCE
            document.body.className = ''; 
            if(data.matchWinner === 1) document.body.classList.add('match-over-1');
            if(data.matchWinner === 2) document.body.classList.add('match-over-2');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Indian Pro Carrom - 29 Target</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;700;900&display=swap');
        
        body { margin: 0; padding: 0; font-family: 'Chakra Petch', sans-serif; color: white; overflow: hidden; }
        
        .hud-wrapper {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center;
            background: rgba(10, 10, 15, 0.95);
            border: 2px solid #444; border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            padding: 5px; transition: 0.5s ease;
        }

        .player-panel {
            display: flex; align-items: center; padding: 10px 20px;
            width: 380px; position: relative; transition: 0.5s ease;
        }
        
        .p1-side { justify-content: flex-start; }
        .p2-side { justify-content: flex-end; flex-direction: row-reverse; text-align: right; }

        .coin-indicator {
            width: 35px; height: 35px; border-radius: 50%; margin: 0 20px;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.6), 0 0 15px rgba(255,255,255,0.1);
        }
        .white-coin { background: #fdfdfd; border: 3px solid #999; }
        .black-coin { background: #111; border: 3px solid #444; }

        .name-box { flex-grow: 1; }
        .name { font-size: 35px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1.1;}
        
        .queen-tag { 
            font-size: 18px; font-weight: 700; color: #ff1744; 
            background: rgba(255, 23, 68, 0.15); padding: 3px 10px; border-radius: 4px;
            border: 1px solid #ff1744; display: inline-block; opacity: 0; transform: translateY(10px); transition: 0.4s;
        }
        .queen-tag.active { opacity: 1; transform: translateY(0); }

        .score { font-size: 75px; font-weight: 700; color: #00e676; width: 100px; text-align: center; text-shadow: 0 0 25px rgba(0, 230, 118, 0.4); line-height: 1;}

        .center-board {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(180deg, #d50000, #9b0000);
            padding: 10px 30px; border-radius: 8px; height: 90px;
            border-left: 2px solid #ff5252; border-right: 2px solid #ff5252;
            box-shadow: 0 0 20px rgba(213, 0, 0, 0.6); position: relative;
        }
        .board-text { font-size: 20px; letter-spacing: 3px; font-weight: 500; color: #ffcdd2; }
        .board-num { font-size: 60px; font-weight: 700; line-height: 0.9; }

        /* The 29-Point Dominance CSS */
        .winner-tag {
            position: absolute; top: -40px; font-size: 30px; font-weight: 900; color: #ffd700;
            text-shadow: 0 0 20px #ffd700; letter-spacing: 5px; opacity: 0; transition: 0.5s;
        }
        .p1-side .winner-tag { left: 20px; }
        .p2-side .winner-tag { right: 20px; }

        /* When someone hits 29 */
        body.match-over-1 .p2-side { opacity: 0.15; filter: grayscale(100%); }
        body.match-over-1 .p1-side { transform: scale(1.05); }
        body.match-over-1 .p1-side .winner-tag { opacity: 1; animation: blink 1s infinite alternate; }
        body.match-over-1 .center-board { filter: grayscale(100%); opacity: 0.5; }

        body.match-over-2 .p1-side { opacity: 0.15; filter: grayscale(100%); }
        body.match-over-2 .p2-side { transform: scale(1.05); }
        body.match-over-2 .p2-side .winner-tag { opacity: 1; animation: blink 1s infinite alternate; }
        body.match-over-2 .center-board { filter: grayscale(100%); opacity: 0.5; }

        @keyframes blink { 0% { text-shadow: 0 0 10px #ffd700; } 100% { text-shadow: 0 0 40px #ffd700, 0 0 20px #fff; } }

    </style>
</head>
<body>

    <div class="hud-wrapper">
        <!-- Player 1 -->
        <div class="player-panel p1-side" id="p1-box">
            <div class="winner-tag">👑 WINNER</div>
            <div class="coin-indicator white-coin" id="p1-coin"></div>
            <div class="name-box">
                <div class="name" id="p1-name">PLAYER 1</div>
                <div class="queen-tag" id="p1-queen">🔴 RED (QUEEN)</div>
            </div>
            <div class="score" id="p1-score">0</div>
        </div>

        <!-- Center Match Info -->
        <div class="center-board">
            <div class="board-text">TARGET</div>
            <div class="board-num">29</div>
        </div>

        <!-- Player 2 -->
        <div class="player-panel p2-side" id="p2-box">
            <div class="winner-tag">👑 WINNER</div>
            <div class="coin-indicator black-coin" id="p2-coin"></div>
            <div class="name-box">
                <div class="name" id="p2-name">PLAYER 2</div>
                <div class="queen-tag" id="p2-queen">🔴 RED (QUEEN)</div>
            </div>
            <div class="score" id="p2-score">0</div>
        </div>
    </div>

    <script>
        window.addEventListener('storage', () => {
            let data = JSON.parse(localStorage.getItem('carromIndiaState') || '{}');
            if(!data.p1Name) return;

            document.getElementById('p1-name').innerText = data.p1Name;
            document.getElementById('p2-name').innerText = data.p2Name;
            
            document.getElementById('p1-score').innerText = data.p1Score;
            document.getElementById('p2-score').innerText = data.p2Score;
            
            document.getElementById('p1-coin').className = 'coin-indicator ' + data.p1Color + '-coin';
            document.getElementById('p2-coin').className = 'coin-indicator ' + data.p2Color + '-coin';

            document.getElementById('p1-queen').classList.toggle('active', data.queen === 1);
            document.getElementById('p2-queen').classList.toggle('active', data.queen === 2);

            // The 29 Point Master Trigger
            document.body.className = ''; 
            if(data.matchWinner === 1) document.body.classList.add('match-over-1');
            if(data.matchWinner === 2) document.body.classList.add('match-over-2');
        });
    </script>
</body>
</html>

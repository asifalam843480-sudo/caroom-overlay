<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HD Carrom Overlay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap');
        
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Oswald', sans-serif; color: white; }

        /* HD Bottom Bar */
        .overlay-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: linear-gradient(90deg, rgba(15,15,15,0.95) 0%, rgba(30,30,30,0.95) 50%, rgba(15,15,15,0.95) 100%);
            border-top: 3px solid #00e676; border-bottom: 3px solid #00e676;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.2);
            padding: 10px 40px; border-radius: 15px;
        }

        /* Player Stats */
        .player-box { text-align: center; width: 250px; position: relative; }
        .name { font-size: 32px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .score { font-size: 70px; font-weight: 700; line-height: 1; color: #00e676; text-shadow: 0 0 20px rgba(0, 230, 118, 0.5); transition: 0.3s; }
        
        /* Advanced Rule Indicators */
        .status-row { display: flex; justify-content: center; gap: 10px; margin-top: 5px; height: 30px; }
        
        .due-tag { 
            background: #ff1744; color: white; padding: 2px 10px; font-size: 18px; border-radius: 5px; 
            box-shadow: 0 0 15px rgba(255, 23, 68, 0.6); opacity: 0; transform: translateY(10px); transition: 0.4s;
        }
        .due-tag.visible { opacity: 1; transform: translateY(0); }

        .queen-tag {
            background: #ffd600; color: #000; padding: 2px 10px; font-size: 18px; border-radius: 5px; font-weight: 700;
            box-shadow: 0 0 15px rgba(255, 214, 0, 0.6); opacity: 0; transform: scale(0.5); transition: 0.4s;
        }
        .queen-tag.visible { opacity: 1; transform: scale(1); }

        /* Center Board */
        .center-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0 30px; border-left: 2px solid rgba(255,255,255,0.1); border-right: 2px solid rgba(255,255,255,0.1);
        }
        .board-txt { font-size: 22px; color: #aaa; letter-spacing: 3px; }
        .board-num { font-size: 45px; font-weight: 700; color: #fff; line-height: 1; }

    </style>
</head>
<body>

    <div class="overlay-container">
        <div class="player-box">
            <div class="name" id="p1-name">PLAYER 1</div>
            <div class="score" id="p1-score">0</div>
            <div class="status-row">
                <div class="due-tag" id="p1-due">DUE: <span id="p1-due-val">0</span></div>
                <div class="queen-tag" id="p1-queen">👑 QUEEN</div>
            </div>
        </div>

        <div class="center-box">
            <div class="board-txt">BOARD</div>
            <div class="board-num" id="board-num">1</div>
        </div>

        <div class="player-box">
            <div class="name" id="p2-name">PLAYER 2</div>
            <div class="score" id="p2-score">0</div>
            <div class="status-row">
                <div class="queen-tag" id="p2-queen">👑 QUEEN</div>
                <div class="due-tag" id="p2-due">DUE: <span id="p2-due-val">0</span></div>
            </div>
        </div>
    </div>

    <script>
        // Automatic Listener - Zero lag, instant update
        window.addEventListener('storage', () => {
            let data = JSON.parse(localStorage.getItem('carromAutoState') || '{}');
            if(!data.p1Name) return;

            document.getElementById('p1-name').innerText = data.p1Name;
            document.getElementById('p2-name').innerText = data.p2Name;
            
            document.getElementById('p1-score').innerText = data.p1Score;
            document.getElementById('p2-score').innerText = data.p2Score;
            
            document.getElementById('board-num').innerText = data.board;

            // Auto Due Logic
            document.getElementById('p1-due').classList.toggle('visible', data.p1Due > 0);
            document.getElementById('p1-due-val').innerText = data.p1Due;
            document.getElementById('p2-due').classList.toggle('visible', data.p2Due > 0);
            document.getElementById('p2-due-val').innerText = data.p2Due;

            // Queen Logic
            document.getElementById('p1-queen').classList.toggle('visible', data.queen === 1);
            document.getElementById('p2-queen').classList.toggle('visible', data.queen === 2);
        });
    </script>
</body>
</html>
